# git-cliff configuration — generates release notes from Conventional Commits.
# The repo enforces Conventional Commits via commitlint, so the history maps
# cleanly to grouped changelog sections. Used by .github/workflows/cd-release.yml.
# https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\n"
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | trim | upper_first }}{% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
# Keep non-conventional commits rather than silently dropping them: PRs are
# squash-merged by title, and a title that misses the conventional prefix (it
# happens — commitlint guards commits, not squash titles) would otherwise
# vanish from the notes. The skip rules below drop genuine noise; everything
# else falls through to "Other".
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+(-rc\\.[0-9]+)?"
topo_order = false
sort_commits = "newest"
commit_parsers = [
  { message = "^Merge ", skip = true },
  { message = "^Initial commit", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI" },
  { message = "^build", group = "Build" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Chores" },
  { message = ".*", group = "Other" },
]
