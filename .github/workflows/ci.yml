name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # Blocking gate: fail the build on moderate-or-higher advisories in
        # production dependencies. Known low-severity advisories that have no
        # compatible patch are documented in pnpm-workspace.yaml `overrides`.
        run: pnpm audit --prod --audit-level=moderate

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  e2e:
    name: E2E (smoke)
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The API/web dev servers import workspace packages through their built
      # `dist` (package `exports`), so the libraries must be built first. The
      # unit-test job gets this via turbo's `test` → `^build` dependency, but
      # this job runs Playwright directly, so build explicitly.
      - name: Build workspace
        run: pnpm run build

      # The API dev server reads `--env-file=.env.local`. The committed
      # example defaults to the keyless `ollama` provider and in-memory store,
      # which is all the smoke needs — the search-flow specs mock the LLM, so
      # no provider is ever actually called.
      - name: Seed env
        run: cp .env.example .env.local

      - name: Install Playwright browser
        run: pnpm --filter @ontology-search/e2e exec playwright install --with-deps chromium

      # Playwright's webServer config boots the real API + web and waits for
      # /health; the smoke spec then asserts the live store is populated.
      - name: Run E2E tests
        run: pnpm --filter @ontology-search/e2e test:e2e
